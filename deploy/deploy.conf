# ============================================================
# cross_env_manager 部署配置文件
# 修改此文件即可调整部署参数，无需修改 deploy.sh
# ============================================================

# 项目名称
PROJECT_NAME="cross_env_manager"

# 服务端口
APP_PORT=5000

# 监听地址
SERVER_HOST="0.0.0.0"

# Supervisor 运行用户
SUPERVISOR_USER="ymsk"

# Supervisor 配置目录
SUPERVISOR_CONF_DIR="/main/server/supervisor"

# 日志目录（相对于项目根目录）
LOG_DIR="logs"

# 虚拟环境目录（相对于项目根目录）
VENV_DIR="venv"

# 离线依赖包目录（相对于部署目录）
VENDOR_DIR="vendor_packages"

# 启动等待时间（秒）
START_WAIT=3

# Python 3 路径（留空自动检测）
# 检测优先级:
#   1. PYTHON3_PATH（此配置，最高优先）
#   2. conda base Python
#   3. 系统默认 python3
#   4. /main/app/python39/bin/python3.9（cross_env_manager 共享 Python 3.9）
#   5. /opt/rh/rh-python39/root/bin/python3（CentOS 7 SCL）
#   6. /usr/local/bin/python3、/usr/local/python3/bin/python3
PYTHON3_PATH=""

<!-- 任务下发表单 -->
<div class="card h-100 animate__animated animate__fadeInLeft">
    <div class="card-header-custom">
        <h4 class="mb-0"><i class="bi bi-send-fill me-2"></i>任务下发</h4>
    </div>
    <div class="card-body-custom">
        <div class="mb-3">
            <label class="form-label fw-semibold">选择区域</label>
            <select id="area-select" class="form-select area-select">
                <option value="">请选择区域</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">任务模板</label>
            <div class="task-select-wrapper">
                <div id="recent-tasks-container"></div>
                <select id="task-select" class="form-select">
                    <option value="">请先选择区域</option>
                </select>
            </div>
        </div>

        <div class="mb-3" id="shelf-group" style="display: none;">
            <label class="form-label fw-semibold">货架号</label>
            <input type="text" id="shelf-input" class="form-control" placeholder="请输入货架号">
            <div class="error-message" id="shelf-error" style="display: none;">请输入货架号</div>
            <div class="shelf-lock-warning" id="shelf-lock" style="display: none;"><i class="bi bi-exclamation-triangle me-1"></i>此货架在5分钟内已下发过任务，请勿重复下发</div>
        </div>

        <!-- 辊筒任务固定点位提示（只读） -->
        <div class="mb-4" id="roller-task-info" style="display: none;">
            <div class="p-3 rounded" style="background:var(--detail-card-bg);border:1px solid var(--border-color);">
                <div class="d-flex align-items-center gap-2">
                    <span class="badge bg-secondary" style="font-size:0.7rem;">辊筒</span>
                    <span class="fw-semibold small">固定下发点位</span>
                </div>
                <div class="mt-1 d-flex align-items-center gap-2">
                    <span style="font-size:1.1rem;">📍</span>
                    <span id="roller-point-display" class="fw-bold">--</span>
                </div>
            </div>
            <!-- 已下发任务列表（辊筒任务容量管控） -->
            <div id="roller-sent-orders" class="mt-2" style="display:none;">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="small fw-semibold text-muted">已下发任务</span>
                    <span id="roller-capacity-badge" class="badge bg-info" style="display:none;font-size:0.65rem;">0/0</span>
                </div>
                <div id="roller-sent-orders-list" class="small"></div>
            </div>
        </div>

        <div class="mb-4" id="task-path-group" style="display: none;">
            <label class="form-label fw-semibold">任务路径</label>
            <select id="task-path-select" class="form-select">
                <option value="">请选择任务路径</option>
            </select>
            <div class="error-message" id="task-path-error" style="display: none;">请选择任务路径</div>
        </div>

        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label fw-semibold mb-0" style="cursor:pointer;" id="advanced-toggle" onclick="toggleAdvancedOptions()">
                    <i class="bi bi-sliders me-1"></i>高级选项
                    <span id="advanced-badge" class="badge bg-warning ms-1" style="display:none;font-size:0.7rem;">已设设备</span>
                    <i id="advanced-chevron" class="bi bi-chevron-down ms-1 small"></i>
                </label>
            </div>
            <div id="advanced-options" style="display:none;">
                <div class="mb-3 p-3 rounded" style="background:var(--bs-tertiary-bg);border:1px dashed var(--bs-warning);">
                    <label class="form-label fw-semibold">指定设备 <span class="text-muted fw-normal small">（可选，谨慎使用）</span></label>
                    <div class="position-relative" id="device-combobox">
                        <input type="text" id="device-input" class="form-select pe-4" placeholder="输入筛选或选择设备..." autocomplete="off" style="cursor:default;">
                        <button class="btn-close position-absolute top-50 translate-middle-y" type="button" id="device-clear-btn" title="清除所选" style="display:none;right:1.5rem;"></button>
                        <ul class="dropdown-menu w-100 shadow" id="device-dropdown-menu" style="max-height:240px;overflow-y:auto;position:absolute;top:100%;left:0;z-index:1000;"></ul>
                    </div>
                    <div class="form-text small">⚠️ 指定后任务仅由该设备执行，请确认无误后再下发。</div>
                </div>
            </div>
        </div>

        <button class="btn btn-primary btn-lg w-100 mb-3" id="submit-btn">
            <i class="bi bi-send me-2"></i>下发任务
        </button>

        <button class="btn btn-outline-secondary w-100" id="debug-toggle">
            <i class="bi bi-code-slash me-2"></i>查看发送的报文
        </button>
        <div class="debug-info" id="debug-info" style="display: none;"></div>
    </div>
</div>

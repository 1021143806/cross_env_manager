# ============================================================
# postlook 部署配置文件
# 修改此文件即可调整部署参数，无需修改 deploy.sh
# ============================================================

# 项目名称
PROJECT_NAME="postlook"

# FastAPI 应用模块路径 (uvicorn 格式)
APP_MODULE="src.postlook.app:app"

# 服务端口
APP_PORT=5011

# 监听地址
SERVER_HOST="0.0.0.0"

# Supervisor 运行用户
SUPERVISOR_USER="ymsk"

# Supervisor 配置目录
SUPERVISOR_CONF_DIR="/main/server/supervisor"

# 日志目录
LOG_DIR="/main/log/app"

# 虚拟环境目录（相对于项目根目录）
VENV_DIR="venv"

# 离线依赖包目录（相对于项目根目录）
VENDOR_DIR="deploy/vendor_packages"

# 启动等待时间（秒）
START_WAIT=3

# 是否启用 reload 模式（开发用，生产建议 false）
RELOAD_MODE=false

# ============================================================
# postlook 部署配置文件
# 修改此文件即可调整部署参数，无需修改 deploy.sh
# ============================================================

# 项目名称
PROJECT_NAME="postlook"

# FastAPI 应用模块路径 (uvicorn 格式)
APP_MODULE="src.postlook.app:app"

# 服务端口
APP_PORT=5011

# 监听地址
SERVER_HOST="0.0.0.0"

# Supervisor 运行用户（部署脚本会自动赋予系统日志读权限）
SUPERVISOR_USER="ymsk"

# Supervisor 配置目录
SUPERVISOR_CONF_DIR="/main/server/supervisor"

# 日志目录（相对于项目根目录）
LOG_DIR="logs"

# 虚拟环境目录（相对于项目根目录）
VENV_DIR="venv"

# 离线依赖包目录（相对于项目根目录）
VENDOR_DIR="deploy/vendor_packages"

# 启动等待时间（秒）
START_WAIT=3

# 是否启用 HTTPS（自签证书）
# true: 使用 HTTPS，需确保 ssl/cert.pem 和 ssl/key.pem 存在
# false: 使用 HTTP
USE_HTTPS=false

# Python 3 路径（留空自动检测）
# 检测优先级:
#   1. PYTHON3_PATH（此配置，最高优先）
#   2. /main/app/python39/bin/python3.9（cross_env_manager 共享 Python 3.9）
#   3. 系统默认 python3
#   4. /opt/rh/rh-python39/root/bin/python3（CentOS 7 SCL）
#   5. /usr/local/bin/python3、/usr/local/python3/bin/python3
PYTHON3_PATH=""

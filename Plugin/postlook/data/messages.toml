# ============================================================
# postlook 报文调试数据 v1.0
# 热更新：POST /api/debug/messages 或直接编辑此文件后 POST /api/debug/reload
#
# 字段说明:
#   name       - 报文名称（显示在发送按钮上）
#   type       - "hex" 十六进制 | "ascii" 文本字符串
#   hex        - 十六进制报文内容（type=hex 时使用）
#   annotation - 注释说明（鼠标悬停 tooltip 显示）
#   seq        - 循环发送顺序号（0=不参与循环，预留字段）
#   delay_ms   - 发送后延时毫秒数（预留字段）
#   color      - 可选的自定义颜色
# ============================================================

# ── 富阳梯博士 召梯指令 ──
[[group]]
name = "富阳梯博士 召梯指令"
desc = "控制电梯召唤到指定楼层，倒数第2字节为楼层号(01-08)，末字节为校验码"

[[group.message]]
name = "召梯到1楼"
type = "hex"
hex = "AB 66 00 00 04 02 01 00 01 F8 03"
annotation = "【召梯到1楼】校验码 F8"


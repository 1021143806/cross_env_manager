# ── 电梯状态查询 ──
[[group]]
name = "电梯状态查询"
desc = "查询电梯当前楼层和运行状态（上下行/开关门/楼层检测/校准）"

[[group.message]]
name = "获取电梯状态"
type = "hex"
hex = "AB 66 00 00 03 01 00 FF FD 03"
annotation = "【查询电梯状态】返回值的倒数第3字节为状态位掩码，详见 readme"


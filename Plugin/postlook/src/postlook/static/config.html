<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>postlook · 配置管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-brand">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>postlook</span>
            </div>
            <nav class="topbar-nav">
                <a href="logs.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span>日志查询</span>
                </a>
                <a href="config.html" class="topbar-tab active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>配置管理</span>
                </a>
                <a href="status.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    <span>服务状态</span>
                </a>
                <a href="topology.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="18" r="3"/><line x1="12" y1="8" x2="5" y2="15"/><circle cx="19" cy="18" r="3"/><line x1="12" y1="8" x2="19" y2="15"/></svg>
                    <span>拓扑</span>
                </a>
            </nav>
            <button class="topbar-theme" id="themeBtn" title="切换主题">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </header>

        <div class="main-area">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-panel" style="display:flex;flex-direction:column">
                    <div class="sb-section">
                        <h4>配置项说明</h4>
                        <div class="sb-info">
                            <p><code>max_lines</code> — 单次查询最大返回行数</p>
                            <p><code>default_lines</code> — 默认查询行数</p>
                            <p><code>recent_files</code> — 默认扫描文件数</p>
                            <p><code>max_download_size</code> — 文件下载上限 (MB)</p>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="content" style="padding:var(--content-padding)">
                <section class="panel active">
                    <div class="glass-card">
                        <div class="config-toolbar">
                            <button id="loadConfigBtn" class="btn-secondary">📥 加载配置</button>
                            <button id="saveConfigBtn" class="btn-primary">💾 保存配置</button>
                            <button id="loadRulesBtn" class="btn-secondary">📋 加载规则</button>
                            <button id="saveRulesBtn" class="btn-primary">🔖 保存规则</button>
                        </div>
                        <div class="scan-section">
                            <div class="scan-header">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                <span>扫描日志目录</span>
                            </div>
                            <div class="scan-input-row">
                                <input type="text" id="scanBase" placeholder="输入基础路径，如 /main/app/" value="/main/app/">
                                <button id="scanBtn" class="btn-secondary">扫描</button>
                            </div>
                            <div id="scanResults" class="scan-results"></div>
                        </div>
                        <div style="display:flex;gap:12px;margin-bottom:12px">
                            <button class="btn-secondary" onclick="switchEditor('main')" style="flex:1" id="tabMainConfig">📋 主配置</button>
                            <button class="btn-secondary" onclick="switchEditor('rules')" style="flex:1" id="tabRulesConfig">🔖 规则配置</button>
                        </div>
                        <textarea id="configEditor" rows="18" placeholder="# postlook 配置文件 (TOML 格式)"></textarea>
                        <div id="configStatus" class="config-status"></div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/config.js"></script>
</body>
</html>

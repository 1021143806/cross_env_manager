            <main class="content" style="padding:var(--content-padding)">

                            <span style="font-size:0.7rem;color:var(--text-secondary)">KG<span style="color:#fbbf24"> ●</span></span>
                            <span style="font-size:0.7rem;color:var(--text-secondary)">全局<span style="color:#818cf8"> ●</span></span>
                            <span style="font-size:0.7rem;color:var(--text-tertiary);margin-left:auto" id="statsCache">缓存: —</span>
                        </div>
                        <canvas id="concurrencyChart" height="160"></canvas>
                    </div>
                </section>

                <!-- 服务状态卡片 -->
                <section class="panel active">
                    <div class="glass-card" id="statusInfo">

    <script src="js/common.js"></script>
    <script src="js/status.js"></script>
    <script>
    // ── 并发监控折线图 ──
    (function() {
        var ctx = document.getElementById('concurrencyChart');
        if (!ctx) return;
        var chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: '查询', data: [], borderColor: '#f87171', backgroundColor: 'rgba(248,113,113,0.08)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1.5 },
                    { label: 'KG',   data: [], borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.08)',  fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1.5 },
                    { label: '全局', data: [], borderColor: '#818cf8', backgroundColor: 'rgba(129,140,248,0.08)',  fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1.5 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 300 },
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { min: 0, max: 10, ticks: { color: '#64748b', font: { size: 9 }, stepSize: 2 }, grid: { color: 'rgba(100,116,139,0.1)' } }
                },
                interaction: { intersect: false, mode: 'index' }
            }
        });

        function formatTime(ts) {
            var d = new Date(ts * 1000);
            return d.getHours().toString().padStart(2,'0') + ':' +
                   d.getMinutes().toString().padStart(2,'0') + ':' +
                   d.getSeconds().toString().padStart(2,'0');
        }

        function refresh() {
            fetch('/api/system/stats').then(function(r) { return r.json(); }).then(function(d) {
                var N = 60;  // 固定 60 点 = 5 分钟窗口
                var t0 = Math.floor(Date.now() / 1000) - N * 5;
                var labels = [];
                for (var i = 0; i < N; i++) labels.push(formatTime(t0 + i * 5));

                var q = new Array(N).fill(0);
                var k = new Array(N).fill(0);
                var g = new Array(N).fill(0);
                for (var i = 0; i < d.timestamps.length; i++) {
                    var idx = Math.floor((d.timestamps[i] - t0) / 5);
                    if (idx >= 0 && idx < N) {
                        q[idx] = Math.min(d.query[i], d.max.query);
                        k[idx] = Math.min(d.kg[i], d.max.kg);
                        g[idx] = Math.min(d.global[i], d.max.global);
                    }
                }

                chart.data.labels = labels;
                chart.data.datasets[0].data = q;
                chart.data.datasets[1].data = k;
                chart.data.datasets[2].data = g;
                chart.options.scales.y.max = Math.max(4, d.max.global || 10);
                chart.update('none');
                var cacheEl = document.getElementById('statsCache');
                if (cacheEl) cacheEl.textContent = '缓存命中: ' + (d.cache_hits || 0);
            }).catch(function() {});
        }

        refresh();
        setInterval(refresh, 5000);
    })();
    </script>
</body>

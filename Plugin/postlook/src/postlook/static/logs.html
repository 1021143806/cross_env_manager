<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<script>if(location.search.includes('embed=1')){document.documentElement.classList.add('embed-mode')}</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>postlook · 日志查询</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 气泡筛选 */
        .chip-row { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; min-height: 1px; }
        .chip {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.72rem; padding: 0.18rem 0.5rem;
            background: var(--accent); color: #fff; border-radius: 14px;
            white-space: nowrap; animation: chipIn 0.15s ease;
        }
        @keyframes chipIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .chip .chip-x {
            background: none; border: none; color: inherit; font-size: 0.9rem;
            line-height: 1; padding: 0; cursor: pointer; opacity: 0.7;
        }
        .chip .chip-x:hover { opacity: 1; }
        /* 筛选网格 */
        .filter-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.75rem;
        }
        /* 结果区 */
        .result-stats {
            display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; padding: 0.5rem 0;
            font-size: 0.78rem; color: var(--text-secondary);
        }
        .result-stats .stat-badge {
            padding: 0.15rem 0.5rem; border-radius: 6px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
        }
        .file-group {
            margin-bottom: 0.75rem; border: 1px solid var(--glass-border);
            border-radius: var(--card-radius-sm); overflow: hidden;
        }
        .file-group-header {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 0.75rem; cursor: pointer;
            background: var(--glass-bg); font-size: 0.82rem;
            user-select: none;
        }
        .file-group-header:hover { background: var(--accent-light); }
        .file-group-header .file-line-count {
            font-size: 0.7rem; color: var(--text-tertiary);
        }
        .file-group-header .btn-copy {
            margin-left: auto; font-size: 0.68rem; padding: 0.15rem 0.4rem;
            background: var(--accent-light); color: var(--accent);
            border: 1px solid var(--accent); border-radius: 4px;
            cursor: pointer; opacity: 0; transition: opacity 0.15s;
        }
        .file-group-header:hover .btn-copy { opacity: 1; }
        .file-group-body { display: none; }
        .file-group-body.open { display: block; }
        .log-table { font-size: 0.75rem; }
        .log-row { display: flex; gap: 0; border-bottom: 1px solid var(--glass-border); }
        .log-row:hover { background: var(--accent-light); }
        .log-row .lr-line { width: 60px; flex-shrink: 0; text-align: right;
            padding: 0.15rem 0.5rem; color: var(--text-tertiary); font-size: 0.68rem; }
        .log-row .lr-content { flex: 1; padding: 0.15rem 0.5rem;
            font-family: 'SF Mono','Monaco','Consolas',monospace; white-space: pre-wrap; word-break: break-all; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-tertiary); }
        .form-select-sm { font-size: 0.82rem; }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-brand">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>postlook</span>
            </div>
            <nav class="topbar-nav">
                <a href="logs.html" class="topbar-tab active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span>日志查询</span>
                </a>
                <a href="config.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>配置管理</span>
                </a>
                <a href="status.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    <span>服务状态</span>
                </a>
                <a href="topology.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="18" r="3"/><line x1="12" y1="8" x2="5" y2="15"/><circle cx="19" cy="18" r="3"/><line x1="12" y1="8" x2="19" y2="15"/></svg>
                    <span>拓扑</span>
                </a>
            </nav>
            <button class="topbar-theme" id="themeBtn" title="切换主题">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </header>

        <div class="main-area">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-panel" style="display:flex;flex-direction:column">
                    <div class="sb-section">
                        <h4>快捷查询</h4>
                        <div class="sb-buttons" id="rulesContainer">
                            <div style="font-size:0.75rem;color:var(--text-tertiary);padding:4px">加载规则中...</div>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="content" style="padding:var(--content-padding)">
                <section class="panel active">
                    <div class="glass-card" style="margin-bottom:1rem;">
                        <div class="filter-grid">
                            <div class="form-group">
                                <label for="folder">日志路径</label>
                                <input type="text" id="folder" placeholder="目录: /var/log 或文件路径" autocomplete="off">
                                <div id="historyDropdown" class="history-dropdown"></div>
                            </div>
                            <div class="form-group">
                                <label for="pattern">文件匹配</label>
                                <select id="pattern" class="form-select-sm" style="width:100%;padding:0.45rem 0.6rem;background:var(--glass-bg);color:var(--text-primary);border:1px solid var(--glass-border);border-radius:6px;">
                                    <option value="*.log">*.log</option>
                                    <option value="*.out">*.out</option>
                                    <option value="*.log.*">*.log.*</option>
                                    <option value="*">* (全部)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="keyword">搜索关键字</label>
                                <input type="text" id="keyword" placeholder="可选，不区分大小写">
                            </div>
                            <div class="form-group">
                                <label for="lineCount">返回行数</label>
                                <select id="lineCount" class="form-select-sm" style="width:100%;padding:0.45rem 0.6rem;background:var(--glass-bg);color:var(--text-primary);border:1px solid var(--glass-border);border-radius:6px;">
                                    <option value="50">50 行</option>
                                    <option value="100" selected>100 行</option>
                                    <option value="200">200 行</option>
                                    <option value="500">500 行</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="tail">读取方向</label>
                                <select id="tail" class="form-select-sm" style="width:100%;padding:0.45rem 0.6rem;background:var(--glass-bg);color:var(--text-primary);border:1px solid var(--glass-border);border-radius:6px;">
                                    <option value="true" selected>文件尾部 (tail)</option>
                                    <option value="false">文件头部 (head)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="recentFiles">最近文件数</label>
                                <select id="recentFiles" class="form-select-sm" style="width:100%;padding:0.45rem 0.6rem;background:var(--glass-bg);color:var(--text-primary);border:1px solid var(--glass-border);border-radius:6px;">
                                    <option value="2" selected>2</option>
                                    <option value="5">5</option>
                                    <option value="10">10</option>
                                    <option value="20">20</option>
                                </select>
                            </div>
                        </div>
                        <div class="chip-row" id="chipFilters"></div>
                        <div class="form-actions" style="display:flex;gap:0.5rem;align-items:center;">
                            <button type="button" class="btn-primary" id="btnQuery" onclick="doQuery()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                查询
                            </button>
                            <button type="button" class="btn-secondary" onclick="resetFilters()">重置</button>
                            <span id="queryTime" style="font-size:0.75rem;color:var(--text-tertiary);"></span>
                        </div>
                    </div>

                    <div id="logResults" class="results-area">
                        <div class="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                            <p>输入查询条件后点击"查询"查看日志</p>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/logs.js"></script>
</body>
</html>

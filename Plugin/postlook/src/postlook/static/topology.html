<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日志拓扑 — postlook</title>
<script src="lib/cytoscape.min.js"></script>
<script src="topology.js"></script>
<style>
:root {
    --bg: #1a1a2e;
    --panel-bg: #16213e;
    --card-bg: #0f3460;
    --text: #e0e0e0;
    --text-secondary: #a0a0b0;
    --accent: #e94560;
    --accent2: #0abde3;
    --accent3: #10ac84;
    --accent4: #f39c12;
    --accent5: #9b59b6;
    --border: #2a2a4a;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
    --transition: 0.3s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; 
}

/* ===== 顶部导航 ===== */
.topbar {
    height: 48px; background: var(--panel-bg); display: flex; align-items: center;
    padding: 0 20px; border-bottom: 1px solid var(--border); z-index: 100;
    gap: 16px; position: relative;
}
.topbar .brand { font-weight: 700; font-size: 15px; color: var(--accent2); letter-spacing: 1px; }
.topbar .brand span { color: var(--text-secondary); font-weight: 400; }
.topbar nav { display: flex; gap: 4px; margin-left: 24px; }
.topbar nav a {
    color: var(--text-secondary); text-decoration: none; padding: 6px 14px;
    border-radius: 6px; font-size: 13px; transition: var(--transition);
}
.topbar nav a:hover, .topbar nav a.active { background: var(--card-bg); color: var(--text); }
.topbar .info { margin-left: auto; font-size: 11px; color: var(--text-secondary); }

/* ===== 主区域 ===== */
.main { display: flex; height: calc(100vh - 48px); }
.graph-area { flex: 1; position: relative; overflow: hidden; }

/* ===== Cytoscape ===== */
#cy { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

/* ===== 图例 ===== */
.legend {
    position: absolute; bottom: 20px; left: 20px; background: var(--panel-bg);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px;
    font-size: 12px; display: flex; flex-direction: column; gap: 6px; z-index: 10;
}
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ===== 侧面板 ===== */
.side-panel {
    width: 0; background: var(--panel-bg); border-left: 1px solid var(--border);
    overflow-y: auto; transition: width var(--transition); position: relative;
    display: flex; flex-direction: column; z-index: 20;
}
.side-panel.open { width: 420px; min-width: 420px; }
.side-panel-inner { padding: 20px; flex: 1; overflow-y: auto; }

.panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
}
.panel-header h3 { font-size: 16px; }
.panel-header .service-name { color: var(--accent2); }
.panel-close {
    background: none; border: 1px solid var(--border); color: var(--text);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 14px;
    transition: var(--transition);
}
.panel-close:hover { background: var(--accent); border-color: var(--accent); }

.panel-section { margin-bottom: 16px; }
.panel-section h4 { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }

.file-list { display: flex; flex-direction: column; gap: 6px; }
.file-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: var(--card-bg); border-radius: 6px;
    font-size: 12px; cursor: pointer; transition: var(--transition);
    border: 1px solid transparent;
}
.file-item:hover { border-color: var(--accent2); }
.file-item .file-name { font-family: monospace; }
.file-item .file-size { color: var(--text-secondary); font-size: 11px; }
.file-actions { display: flex; gap: 6px; }
.file-action {
    padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
    border: 1px solid var(--border); background: var(--panel-bg); color: var(--text);
    transition: var(--transition);
}
.file-action:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
.file-action.download:hover { background: var(--accent3); border-color: var(--accent3); }

/* 日志预览 */
.log-preview {
    max-height: 300px; overflow-y: auto; background: #0a0a1a;
    border-radius: 6px; padding: 10px; font-family: monospace; font-size: 11px;
    line-height: 1.5; border: 1px solid var(--border);
}
.log-preview .log-line { white-space: nowrap; }
.log-preview .log-line.error { color: var(--accent); }
.log-preview .log-line.warn  { color: var(--accent4); }

.btn { 
    padding: 6px 14px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer;
    transition: var(--transition); display: inline-flex; align-items: center; gap: 4px;
}
.btn-primary { background: var(--accent2); color: #fff; }
.btn-primary:hover { opacity: 0.85; }
.btn-accent { background: var(--accent3); color: #fff; }
.btn-accent:hover { opacity: 0.85; }

.loading { 
    text-align: center; padding: 20px; color: var(--text-secondary);
    font-size: 13px;
}

/* Tooltip */
.tooltip-div {
    display: none; position: fixed; z-index: 999; pointer-events: none;
    background: var(--panel-bg); border: 1px solid var(--accent2); border-radius: 6px;
    padding: 6px 10px; font-size: 11px; color: var(--text); white-space: nowrap;
    max-width: 250px; box-shadow: var(--shadow);
}

/* 响应式 */
@media (max-width: 768px) {
    .side-panel.open { width: 100%; min-width: 0; }
    .legend { bottom: 10px; left: 10px; font-size: 10px; padding: 8px; }
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
    <div class="brand">⚡ postlook <span>v0.2.0</span></div>
    <nav>
        <a href="/">📋 日志查询</a>
        <a href="/topology.html" class="active">🔗 服务拓扑</a>
    </nav>
    <div class="info" id="statusInfo">加载中...</div>
</div>

<!-- 主区域 -->
<div class="main">
    <!-- 图形区域 -->
    <div class="graph-area">
        <div id="cy"></div>
        <div class="legend">
            <div class="legend-item"><span class="legend-dot" style="background:var(--accent2)"></span> 应用服务 (25)</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span> 路径规划 (7)</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--accent4)"></span> 中间件 (2)</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--accent3)"></span> 系统日志</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--accent5)"></span> 数据库</div>
        </div>
    </div>

    <!-- 侧边详情面板 -->
    <div class="side-panel" id="sidePanel">
        <div class="side-panel-inner" id="panelContent">
            <div style="text-align:center;color:var(--text-secondary);padding:40px;font-size:13px;">
                👈 点击图中节点查看日志
            </div>
        </div>
    </div>
</div>

</body>
</html>

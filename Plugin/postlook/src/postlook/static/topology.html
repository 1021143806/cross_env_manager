<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<script>if(location.search.includes('embed=1')){document.documentElement.classList.add('embed-mode')}</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>postlook · 拓扑</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f8ff7' stroke-width='2.5'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><polyline points='14 2 14 8 20 8'/></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="lib/dagre.min.js"></script>
    <script src="lib/cytoscape.min.js"></script>
    <script src="lib/cytoscape-dagre.js"></script>
    <script src="lib/d3.v7.min.js"></script>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-brand">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>postlook</span>
            </div>
            <nav class="topbar-nav">
                <a href="logs.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span>日志查询</span>
                </a>
                <a href="config.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>配置管理</span>
                </a>
                <a href="status.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    <span>服务状态</span>
                </a>
                <a href="topology.html" class="topbar-tab active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="18" r="3"/><line x1="12" y1="8" x2="5" y2="15"/><circle cx="19" cy="18" r="3"/><line x1="12" y1="8" x2="19" y2="15"/></svg>
                    <span>拓扑</span>
                </a>
                <a href="debug.html" class="topbar-tab">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                    <span>调试</span>
                </a>
            </nav>
            <button class="topbar-theme" id="themeBtn" title="切换主题">
                <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </header>

        <div class="main-area">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-panel" style="display:flex;flex-direction:column">
                    <div class="sb-section">
                        <h4>🔍 搜索</h4>
                        <input type="text" class="sb-search" id="topoSearch" placeholder="搜索节点..." oninput="window.filterTopoNodes(this.value)">
                    </div>
                    <div class="sb-section">
                        <button class="topo-discover-btn" id="topoDiscoverBtn" onclick="openDiscoverModal()" title="自动扫描 supervisor + 目录发现新服务">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                            自动发现
                        </button>
                    </div>
                    <div class="sb-section">
                        <h4>视图</h4>
                        <div class="view-switcher" id="viewSwitcher"></div>
                        <button class="topo-discover-btn" id="tidyBtn" style="margin-top:6px;width:100%;display:none" onclick="tidyUpKG()" title="重新整理图谱布局">🔄 一键整理</button>
                        <button class="topo-discover-btn" id="toggleLogBtn" style="margin-top:4px;width:100%;display:none" onclick="toggleLogNodes()" title="显示/隐藏日志文件节点">📄 日志文件: 开</button>
                    </div>
                    <div class="sb-section">
                        <h4>目录</h4>
                        <div class="sb-layers" id="topoLayers"></div>
                    </div>
                    <div class="sb-section">
                        <h4>图例</h4>
                        <div class="sb-legend"></div>
                    </div>
                </div>
            </aside>

            <main class="content" style="padding:0;overflow:hidden">
                <section class="panel active" id="panel-topology" style="position:absolute;top:0;left:0;right:0;bottom:0;padding:0;overflow:hidden;background:transparent">
                    <div id="cy" style="position:absolute;top:0;left:0;width:100%;height:100%"></div>
                    <div class="topo-detail" id="topoDetail" style="display:none">
                        <div class="topo-detail-header">
                            <h3 id="topoDetailName"></h3>
                            <button onclick="closeTopoDetail()" class="panel-close">✕</button>
                        </div>
                        <div class="topo-detail-body" id="topoDetailBody"></div>
                    </div>
                    <!-- 知识图谱：三元组面板 -->
                    <div class="kg-panel" id="kgPanel" style="display:none">
                        <div class="kg-panel-header">
                            <h3 id="kgPanelTitle">三元组</h3>
                            <button onclick="closeKgPanel()" class="panel-close">✕</button>
                        </div>
                        <div class="kg-panel-body" id="kgPanelBody"></div>
                    </div>
                    <div class="topo-status" id="topoStatus">加载中...</div>
                </section>
            </main>
        </div>
    </div>

    <!-- 自动发现弹窗 -->
    <div class="modal-overlay" id="discoverOverlay" style="display:none">
        <div class="modal discover-modal">
            <div class="modal-header">
                <h3>🔄 自动发现服务</h3>
                <button class="modal-close" onclick="closeDiscoverModal()">✕</button>
            </div>
            <div class="modal-body" id="discoverBody">
                <div class="discover-loading">正在扫描 supervisor + 目录...</div>
            </div>
            <div class="modal-footer">
                <button class="topo-discover-btn" onclick="selectAllNew()" id="selectAllBtn" style="display:none">☑ 全选新服务</button>
                <button class="topo-discover-btn primary" onclick="mergeSelected()" id="mergeBtn" style="display:none">合并选中项</button>
                <button class="topo-discover-btn" onclick="closeDiscoverModal()">取消</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/topology.js"></script>
</body>
</html>

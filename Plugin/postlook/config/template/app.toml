# ============================================================
# 日志目录元数据（文件浏览器 + 拓扑详情面板显示备注）
# ============================================================
[[dir]]
path = "/main/app/gateway/logs"
name = "Gateway"
desc = "API 网关，所有请求入口。关注 ERROR/Exception/recycle error"
tags = ["java", "gateway", "核心"]

[[dir]]
path = "/var/log"
name = "系统日志"
desc = "OS 日志：messages(内核/OOM)、secure(SSH)、cron(定时任务)"
tags = ["system", "os"]

[[dir]]
path = "/main/server/nacos/logs"
name = "Nacos"
desc = "服务注册与配置中心，关注 core-auth.log 和命名服务日志"
tags = ["middleware", "java"]

[[dir]]
path = "/main/server/mysql"
name = "MariaDB"
desc = "数据库日志：slow-sql(慢查询)、error(启动/连接错误)"
tags = ["database", "核心"]

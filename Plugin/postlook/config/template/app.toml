# ============================================================
# postlook 统一配置文件 (v0.3.0)
# 合并原有的 server/logs/ui 配置 + 规则/拓扑/目录元数据
# ============================================================

[server]
host = "0.0.0.0"
port = 5011

[logs]
# 允许访问的日志根目录
root_dirs = [
    "/var/log",
    "/main/log/app",
    "/main/app/gateway/logs",
    "/main/app/bms/logs",
    "/main/app/rdms/logs",
    "/main/app/sps/logs",
    "/main/app/tps/logs",
    "/main/app/ics/logs",
    "/main/app/fms/logs",
    "/main/app/revent/logs",
    "/main/app/pms/logs",
    "/main/app/cms/logs",
    "/main/app/wdcs/logs",
    "/main/server/nacos/logs",
    "/main/server/mysql",
]
max_lines = 100
default_lines = 50
default_recent_files = 10
max_download_size = 200

[ui]
theme = "dark"

# ============================================================
# 快捷查询规则（左侧栏按钮，点击一键填表查询）
# ============================================================
[[rule]]
name = "Gateway 错误"
folder = "/main/app/gateway/logs"
pattern = "GATEWAY.log"
keyword = "ERROR|Exception"
desc = "网关所有异常日志"

[[rule]]
name = "系统 OOM"
folder = "/var/log"
pattern = "messages*"
keyword = "oom_kill|Out of memory|Killed process"
desc = "查找 OOM Killer 记录"

[[rule]]
name = "SSH 登录记录"
folder = "/var/log"
pattern = "secure*"
keyword = "Accepted|Failed"
desc = "SSH 登录成功/失败"

[[rule]]
name = "定时任务"
folder = "/var/log"
pattern = "cron*"
keyword = "CMD"
desc = "cron 定时任务执行记录"

[[rule]]
name = "MariaDB 慢查询"
folder = "/main/server/mysql"
pattern = "slow-sql"
line_start = 1
line_end = 200
desc = "慢查询日志，定位锁等待/全表扫描"

[[rule]]
name = "Nacos 错误"
folder = "/main/server/nacos/logs"
pattern = "nacos.log"
keyword = "ERROR|Exception"
desc = "Nacos 服务注册/配置异常"

# ============================================================
# 拓扑图配置
# ============================================================

# -- 分类（环形布局中的一级节点） --
[[topology.category]]
id = "apps"
label = "应用系统"
color = "#0abde3"
desc = "Java/Spring Boot 微服务"

[[topology.category]]
id = "planner"
label = "路径规划"
color = "#f87171"
desc = "C++ RTPS 算法进程"

[[topology.category]]
id = "middleware"
label = "中间件"
color = "#fbbf24"
desc = "Nacos / Filebeat / Redis"

[[topology.category]]
id = "system"
label = "系统日志"
color = "#4ade80"
desc = "OS 内核 / 安全 / 定时任务"

[[topology.category]]
id = "database"
label = "数据库"
color = "#a855f7"
desc = "MariaDB 8.4.8"


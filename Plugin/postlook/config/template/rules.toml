# ============================================================
# postlook 自定义规则 v0.3.0
# 热更新：POST /api/rules 提交此文件内容即可生效
#
# 同名规则（name）会覆盖内置规则，不同名的追加到末尾。
# 内置规则不可见的规则不受影响。
# ============================================================

# 示例：覆盖内置的"错误/严重"规则，改为自己的颜色
# [[rule]]
# name = "错误/严重"
# type = "keyword"
# match = "ERROR|FATAL"
# color = "#ff0000"
# bold = true

# 示例：新增一条电梯报文注解
# [[rule]]
# name = "电梯状态返回(4楼下行)"
# type = "hex"
# match = "AB 66 00 00 05 81 00 00 04 02 75 03"
# file = "WDCS*.log"
# color = "#fbbf24"
# annotation = "【4楼 · 下行】"

# 你的自定义规则写在这里 ↓

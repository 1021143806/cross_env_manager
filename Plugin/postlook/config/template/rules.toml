# ============================================================
# postlook 规则配置 v0.3.0
# 热更新：POST /api/rules 提交此文件内容即可生效
#
# 一条 [[rule]] 可同时发挥三个作用：
#   ① 着色  — 日志显示时自动匹配并高亮
#   ② 注释  — 匹配内容旁标注 annotation 文字
#   ③ 查询  — 带 folder/pattern 时在侧栏显示一键按钮
# ============================================================

# ── 匹配类型 ──
# type = "hex"     16 进制字节序列（自动忽略大小写和空格）
# type = "regex"   正则表达式
# type = "keyword" 内容包含关键字（| 分隔表示任一匹配）

# ═════════════════════════════════════════════════════
# 富阳梯博士电梯 485 协议报文 → 着色 + 注解
# 日志文件：WDCS*.log 中的十六进制报文
# ═════════════════════════════════════════════════════

# 召梯指令（见文本文档）
[[rule]]
name = "电梯召梯到1楼"
type = "hex"
match = "AB 66 00 00 04 02 01 00 01 F8 03"
file = "WDCS*.log"
color = "#34d399"
annotation = "【召梯到1楼】"

[[rule]]
name = "电梯召梯到2楼"
type = "hex"

# 获取电梯状态（查询指令）
[[rule]]
name = "获取电梯状态"
type = "hex"
match = "AB 66 00 00 03 01 00 FF FD 03"
file = "WDCS*.log"
color = "#818cf8"
annotation = "【获取电梯状态】"

# 电梯状态返回
[[rule]]
name = "电梯在1楼"
type = "hex"
match = "AB 66 00 00 05 81 00 00 01 68 11 03"
file = "WDCS*.log"
color = "#fbbf24"
annotation = "【1楼 · 开门到位】"

[[rule]]
name = "电梯在2楼"
type = "hex"
match = "AB 66 00 00 05 81 00 00 02 01 77 03"
file = "WDCS*.log"
color = "#fbbf24"
annotation = "【2楼 · 上行】"

[[rule]]
name = "电梯在3楼"
type = "hex"
match = "AB 66 00 00 05 81 00 00 03 6C 0B 03"
file = "WDCS*.log"
color = "#fbbf24"
annotation = "【3楼 · 到达+开门】"

# 开门/关门
[[rule]]
name = "开门报文"
type = "hex"
match = "AB 66 00 00 03 03 01 10 E9 03"
file = "WDCS*.log"
color = "#f472b6"
annotation = "【开门】"

[[rule]]
name = "关门报文"
type = "hex"
match = "AB 66 00 00 03 04 01 10 E8 03"
file = "WDCS*.log"
color = "#f472b6"
annotation = "【关门】"

# ═════════════════════════════════════════════════════
# 日志级别着色（全局生效，不限定文件）
# ═════════════════════════════════════════════════════

[[rule]]
name = "错误/严重"
type = "keyword"
match = "ERROR|FATAL"
color = "#ef4444"
background = "rgba(239,68,68,0.10)"
bold = true

[[rule]]
name = "警告"
type = "keyword"
match = "WARN"
color = "#f59e0b"
background = "rgba(245,158,11,0.08)"

[[rule]]
name = "异常"
type = "keyword"
match = "Exception"
color = "#ef4444"
background = "rgba(239,68,68,0.06)"

# ═════════════════════════════════════════════════════
# 快捷查询规则（含 folder/pattern，显示为侧栏按钮）
# ═════════════════════════════════════════════════════

[[rule]]
name = "Gateway 错误"
type = "keyword"
match = "ERROR|Exception"
folder = "/main/app/gateway/logs"
pattern = "GATEWAY.log"
color = "#ef4444"
desc = "网关所有异常日志"

[[rule]]
name = "系统 OOM"
type = "keyword"
match = "oom_kill|Out of memory|Killed process"
folder = "/var/log"
pattern = "messages*"
color = "#dc2626"
bold = true
desc = "查找 OOM Killer 记录"

[[rule]]
name = "MariaDB 慢查询"
type = "regex"
match = "Query_time: \d+\.\d+"
folder = "/main/server/mysql"
pattern = "slow-sql"
desc = "慢查询日志，定位锁等待/全表扫描"

[[rule]]
name = "Nacos 错误"
type = "keyword"
match = "ERROR|Exception"
folder = "/main/server/nacos/logs"
pattern = "nacos.log"
color = "#ef4444"
desc = "Nacos 服务注册/配置异常"

[[rule]]
name = "SSH 登录记录"
type = "keyword"
match = "Accepted|Failed"
folder = "/var/log"
pattern = "secure*"
desc = "SSH 登录成功/失败"

[[rule]]
name = "定时任务"
type = "keyword"
match = "CMD"
folder = "/var/log"
pattern = "cron*"
desc = "cron 定时任务执行记录"

# postlook 配置文件模板
# 复制为 config/env.toml 并修改实际值

[server]
host = "0.0.0.0"
port = 5011

[logs]
# 允许访问的日志根目录（多个目录用数组）
root_dirs =  ["/var/log", "/main/app/logs", "/home/user/logs"]
# 每次查询最大返回行数
max_lines = 100
# 默认返回行数
default_lines = 50
# 默认扫描最近文件数
default_recent_files = 10

[ui]
# 默认主题: dark | light
theme = "dark"

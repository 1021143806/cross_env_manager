# ═══════════════════════════════════════════════════════
#  模块开关 —— 控制哪些功能模块可用
#  关闭的模块不加载蓝图、不注册路由、不启动后台线程，
#  对应的顶栏 Tab 和侧边栏菜单亦不可见。
#  系统管理模块 (system) 始终启用，不可关闭。
# ═══════════════════════════════════════════════════════
[modules]
config_module = true   # 跨环境配置（交接点、定制表、模板管理）
dispatch = true        # 调车调度（看板、配置、自愈检查）
task = true            # 任务下发
query = true           # 任务查询（统一查询、跨环境浏览）
postlook = true        # 日志查看（Postlook 嵌入）